<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes drawLine {
        from {
          stroke-dashoffset: 200;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes glow {
        0%, 100% {
          filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.5));
        }
        50% {
          filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.8));
        }
      }

      .title {
        font-family: 'Arial', sans-serif;
        font-size: 64px;
        font-weight: bold;
        fill: #1e293b;
        animation: slideInLeft 1s ease-out forwards;
      }

      .subtitle {
        font-family: 'Arial', sans-serif;
        font-size: 24px;
        fill: #475569;
        animation: slideInLeft 1s ease-out 0.2s forwards;
        opacity: 0;
      }

      .line {
        stroke: #3b82f6;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 200;
        animation: drawLine 2s ease-in-out forwards;
      }

      .line1 {
        animation-delay: 0.3s;
      }

      .line2 {
        animation-delay: 0.6s;
      }

      .circle {
        fill: #3b82f6;
        animation: pulse 2s ease-in-out infinite;
      }

      .circle1 {
        animation-delay: 0s;
      }

      .circle2 {
        animation-delay: 0.3s;
      }

      .circle3 {
        animation-delay: 0.6s;
      }

      .gear {
        animation: rotate 8s linear infinite;
        transform-origin: 1100px 80px;
      }

      .icon {
        animation: glow 2s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="300" fill="#f8fafc"/>

  <!-- Decorative circles with pulse -->
  <circle cx="100" cy="80" r="20" class="circle circle1" fill="#3b82f6" opacity="0.3"/>
  <circle cx="150" cy="120" r="15" class="circle circle2" fill="#06b6d4" opacity="0.3"/>
  <circle cx="80" cy="180" r="18" class="circle circle3" fill="#8b5cf6" opacity="0.3"/>

  <!-- Animated lines -->
  <path d="M 100 60 Q 200 100, 300 50" class="line line1" stroke="#3b82f6"/>
  <path d="M 100 120 L 320 120" class="line line2" stroke="#06b6d4"/>

  <!-- Main title -->
  <text x="100" y="100" class="title">FEMO</text>

  <!-- Subtitle -->
  <text x="100" y="180" class="subtitle">Gestão de Agência | Crescimento Estratégico</text>

  <!-- Right side decorative elements -->
  <g class="icon">
    <circle cx="1100" cy="80" r="35" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
    <circle cx="1100" cy="80" r="25" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
    <circle cx="1100" cy="80" r="15" fill="#3b82f6" opacity="0.7"/>
  </g>

  <!-- Animated gear -->
  <g class="gear">
    <circle cx="1100" cy="220" r="8" fill="#3b82f6"/>
    <path d="M 1100 212 L 1104 210 L 1108 212 L 1107 216 L 1109 220 L 1107 224 L 1108 228 L 1104 230 L 1100 228 L 1096 230 L 1092 228 L 1091 224 L 1093 220 L 1091 216 L 1092 212 Z" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  </g>

  <!-- Bottom accent line -->
  <line x1="100" y1="260" x2="400" y2="260" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>