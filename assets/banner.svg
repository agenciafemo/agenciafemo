<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes drawLine {
        from {
          stroke-dashoffset: 200;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes glow {
        0%, 100% {
          filter: drop-shadow(0 0 5px rgba(239, 90, 43, 0.5));
        }
        50% {
          filter: drop-shadow(0 0 15px rgba(239, 90, 43, 0.8));
        }
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .title {
        font-family: 'Arial', sans-serif;
        font-size: 72px;
        font-weight: 900;
        fill: #000000;
        animation: slideInLeft 0.8s ease-out forwards;
        letter-spacing: 3px;
      }

      .subtitle {
        font-family: 'Arial', sans-serif;
        font-size: 20px;
        fill: #b4b4b4;
        animation: slideInLeft 0.8s ease-out 0.2s forwards;
        opacity: 0;
        font-weight: 500;
      }

      .line {
        stroke: #ef5a2b;
        stroke-width: 4;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 200;
        animation: drawLine 2s ease-in-out forwards;
      }

      .line1 {
        animation-delay: 0.3s;
      }

      .line2 {
        animation-delay: 0.6s;
        stroke: #ffa182;
      }

      .circle {
        animation: pulse 2s ease-in-out infinite;
      }

      .circle1 {
        fill: #ef5a2b;
        animation-delay: 0s;
      }

      .circle2 {
        fill: #ffa182;
        animation-delay: 0.3s;
      }

      .circle3 {
        fill: #ef5a2b;
        animation-delay: 0.6s;
      }

      .gear {
        animation: rotate 10s linear infinite;
        transform-origin: 1100px 80px;
      }

      .icon {
        animation: glow 2.5s ease-in-out infinite;
      }

      .accent-box {
        animation: float 3s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background com gradiente sutil -->
  <rect width="1200" height="300" fill="#ffffff"/>
  <rect width="1200" height="300" fill="url(#bgGradient)" opacity="0.02"/>

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5a2b;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Decorative circles com pulse -->
  <circle cx="80" cy="70" r="22" class="circle circle1" opacity="0.3"/>
  <circle cx="140" cy="110" r="16" class="circle circle2" opacity="0.4"/>
  <circle cx="60" cy="180" r="20" class="circle circle3" opacity="0.25"/>

  <!-- Animated lines -->
  <path d="M 100 50 Q 200 90, 320 40" class="line line1"/>
  <path d="M 100 120 L 340 120" class="line line2"/>

  <!-- Main title -->
  <text x="100" y="100" class="title">FEMO</text>

  <!-- Subtitle -->
  <text x="100" y="185" class="subtitle">Gestão de Agência • Crescimento Estratégico</text>

  <!-- Right side: Animated circles with glow -->
  <g class="icon">
    <circle cx="1100" cy="80" r="40" fill="none" stroke="#ef5a2b" stroke-width="2" opacity="0.2"/>
    <circle cx="1100" cy="80" r="28" fill="none" stroke="#ffa182" stroke-width="2" opacity="0.4"/>
    <circle cx="1100" cy="80" r="16" fill="#ef5a2b" opacity="0.85"/>
  </g>

  <!-- Accent box floating -->
  <g class="accent-box">
    <rect x="1050" y="180" width="100" height="80" fill="none" stroke="#ef5a2b" stroke-width="2" rx="8" opacity="0.6"/>
    <text x="1065" y="215" font-family="Arial" font-size="12" fill="#ef5a2b" font-weight="bold">AGÊNCIA</text>
    <text x="1055" y="235" font-family="Arial" font-size="10" fill="#b4b4b4">Digital</text>
  </g>

  <!-- Bottom accent line - dual color -->
  <line x1="100" y1="260" x2="300" y2="260" stroke="#ef5a2b" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="305" y1="260" x2="450" y2="260" stroke="#ffa182" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>