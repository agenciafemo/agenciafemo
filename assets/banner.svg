<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes drawLine {
        from {
          stroke-dashoffset: 150;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes glow {
        0%, 100% {
          filter: drop-shadow(0 0 5px rgba(239, 90, 43, 0.6));
        }
        50% {
          filter: drop-shadow(0 0 15px rgba(239, 90, 43, 0.9));
        }
      }

      .title {
        font-family: 'Arial', sans-serif;
        font-size: 80px;
        font-weight: 900;
        fill: #000000;
        animation: slideInLeft 0.8s ease-out forwards;
        letter-spacing: 4px;
      }

      .subtitle {
        font-family: 'Arial', sans-serif;
        font-size: 18px;
        fill: #b4b4b4;
        animation: slideInLeft 0.8s ease-out 0.2s forwards;
        opacity: 0;
        font-weight: 500;
        letter-spacing: 1px;
      }

      .line {
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 150;
        animation: drawLine 1.8s ease-in-out forwards;
      }

      .line-orange {
        stroke: #ef5a2b;
      }

      .line-accent {
        stroke: #ffa182;
      }

      .circle-accent {
        fill: #ef5a2b;
        animation: pulse 2.5s ease-in-out infinite;
      }

      .element-right {
        animation: glow 2.5s ease-in-out infinite;
      }
    </style>
  </defs>

  <rect width="1200" height="300" fill="#ffffff"/>

  <text x="80" y="120" class="title">FEMO</text>

  <text x="80" y="180" class="subtitle">Gestao de Agencia</text>

  <line x1="80" y1="195" x2="350" y2="195" class="line line-orange" style="animation-delay: 0.3s;"/>

  <line x1="80" y1="220" x2="280" y2="220" class="line line-accent" style="animation-delay: 0.6s;"/>

  <circle cx="900" cy="80" r="50" fill="none" stroke="#ef5a2b" stroke-width="2" opacity="0.3"/>
  <circle cx="900" cy="80" r="35" fill="none" stroke="#ef5a2b" stroke-width="1.5" opacity="0.5" class="element-right"/>
  <circle cx="900" cy="80" r="20" fill="#ef5a2b" opacity="0.8" class="element-right"/>

  <rect x="850" y="180" width="100" height="80" fill="none" stroke="#ef5a2b" stroke-width="2" rx="6" opacity="0.6"/>
  <text x="865" y="210" font-family="Arial" font-size="13" fill="#ef5a2b" font-weight="bold">AGENCIA</text>
  <text x="875" y="235" font-family="Arial" font-size="11" fill="#b4b4b4">Digital</text>

  <circle cx="550" cy="250" r="8" fill="#ef5a2b" opacity="0.5" class="circle-accent"/>
  <circle cx="600" cy="260" r="6" fill="#ffa182" opacity="0.6" class="circle-accent" style="animation-delay: 0.2s;"/>
</svg>